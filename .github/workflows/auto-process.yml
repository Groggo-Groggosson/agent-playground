name: Auto Process Contributions

on:
  pull_request_target:
    types: [opened]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update leaderboard
        run: node scripts/update-leaderboard.js "${{ github.actor }}" "${{ github.event.pull_request.number }}"

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard for PR #${{ github.event.pull_request.number }}"
          git push origin main

      - name: Close PR with comment
        uses: peter-evans/close-pull-request@v3
        with:
          comment: "Thanks for contributing! 🎉 You've been added to the leaderboard."
