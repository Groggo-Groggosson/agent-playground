name: Seed Good First Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Create starter issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              {
                title: "Add JSDoc to userService",
                body: "Add concise JSDoc comments to the user service functions so future contributors can understand the intended behavior."
              },
              {
                title: "Fix typo in README",
                body: "Review the README for minor spelling, grammar, or formatting issues and submit a small cleanup PR."
              },
              {
                title: "Add input validation to loginController",
                body: "Add basic request validation comments or TODOs around the login controller stub so the intended validation path is clearer."
              },
              {
                title: "Document environment variables",
                body: "Add a short section describing expected local environment variables for the web and API apps."
              },
              {
                title: "Add placeholder API health check docs",
                body: "Document the planned health check endpoint and expected response shape."
              },
              {
                title: "Improve Prisma model comments",
                body: "Add brief comments to the Prisma schema models explaining their role in the TaskFlow domain."
              },
              {
                title: "Add missing package descriptions",
                body: "Add descriptions to package metadata where useful so workspace packages are easier to identify."
              },
              {
                title: "Clarify local development steps",
                body: "Make the local setup instructions clearer for a contributor starting from a fresh clone."
              },
              {
                title: "Add TODOs for user routes",
                body: "Add clear TODO comments to the user route stubs describing expected future route behavior."
              },
              {
                title: "Create UI Button stub",
                body: "Add a minimal shared Button component stub under the UI package."
              },
              {
                title: "Add API error response notes",
                body: "Document the intended shape for future API error responses."
              },
              {
                title: "Add dashboard copy placeholder",
                body: "Add simple placeholder copy to the web dashboard page for the task summary area."
              },
              {
                title: "Clean up import ordering",
                body: "Review stub files and adjust import ordering for consistency."
              },
              {
                title: "Add proposal model notes",
                body: "Expand the schema comments around proposals and their relationship to jobs and users."
              },
              {
                title: "Add testing strategy notes",
                body: "Add a short note describing the planned test strategy for apps and packages."
              }
            ];

            for (const issue of issues) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: ["good-first-issue"]
              });
            }
